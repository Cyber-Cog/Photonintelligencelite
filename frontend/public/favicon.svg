<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Photon Intelligence Center Lite">
  <title>Photon Intelligence Center Lite</title>
  <defs>
    <linearGradient id="pic-bg" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="pic-cell" x1="10" y1="10" x2="42" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#pic-bg)"/>
  <!-- Photovoltaic module — 3×2 cells (reads clean at 16px) -->
  <g fill="url(#pic-cell)">
    <rect x="9" y="10" width="14" height="14" rx="2"/>
    <rect x="25" y="10" width="14" height="14" rx="2"/>
    <rect x="41" y="10" width="14" height="14" rx="2" opacity="0.88"/>
    <rect x="9" y="26" width="14" height="14" rx="2"/>
    <rect x="25" y="26" width="14" height="14" rx="2"/>
    <rect x="41" y="26" width="14" height="14" rx="2" opacity="0.88"/>
  </g>
  <!-- SCADA telemetry pulse + analytics node -->
  <path d="M8 52 L20 46 L30 50 L42 34 L50 40 L56 28" fill="none" stroke="#34d399" stroke-width="3.25" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="56" cy="28" r="4" fill="#10b981"/>
  <circle cx="56" cy="28" r="1.75" fill="#ecfdf5"/>
</svg>
